name: Build and publish SRS

on:
  schedule:
    - cron: '13 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Build SRS files
        run: bash scripts/build-srs.sh

      - name: Delete previous latest release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete latest --yes || true
          git push origin :refs/tags/latest || true

      - name: Create latest release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          tag_name: latest
          release_name: Latest SRS build
          draft: false
          prerelease: false
      - name: Upload selected release assets
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          gh release upload latest dist/publish/* --clobber